<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Velvoix | Scheduled Update</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eff3f9;
        --panel: rgba(255, 255, 255, 0.88);
        --border: rgba(33, 65, 120, 0.14);
        --text: #0f172a;
        --muted: #5f6f88;
        --accent: #214178;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(33, 65, 120, 0.10), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(123, 152, 203, 0.10), transparent 32rem),
          linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
      }

      main {
        width: min(100%, 760px);
        padding: 48px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 22px 54px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.76rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 6vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      p {
        margin: 20px 0 0;
        max-width: 34rem;
        font-size: 1.02rem;
        line-height: 1.7;
        color: var(--muted);
      }

      .brand {
        display: inline-block;
        margin-bottom: 32px;
        color: var(--accent);
        font-weight: 700;
        letter-spacing: -0.03em;
        font-size: 1.45rem;
      }

      .contact {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid rgba(33, 65, 120, 0.1);
        font-size: 0.96rem;
        color: var(--muted);
      }

      .contact a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      .contact a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <span>Velvoix</span>
      </div>
      <p class="eyebrow">Scheduled Update</p>
      <h1>We will be back shortly.</h1>
      <p>
        Velvoix is temporarily unavailable while we complete a scheduled platform update.
        Please check back shortly.
      </p>
      <p class="contact">
        For urgent matters:
        <a href="mailto:info@velvoix.com">info@velvoix.com</a>
      </p>
    </main>
  </body>
</html>
