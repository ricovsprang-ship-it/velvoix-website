<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Velvoix | Under Construction</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef4fb;
        --panel: rgba(255, 255, 255, 0.88);
        --border: rgba(33, 65, 120, 0.14);
        --text: #0f172a;
        --muted: #5f6f88;
        --accent: #214178;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(33, 65, 120, 0.18), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(123, 152, 203, 0.16), transparent 32rem),
          linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
      }

      main {
        width: min(100%, 760px);
        padding: 48px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.76rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 6vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      p {
        margin: 20px 0 0;
        max-width: 34rem;
        font-size: 1.02rem;
        line-height: 1.7;
        color: var(--muted);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
        color: var(--accent);
        font-weight: 700;
        letter-spacing: -0.03em;
        font-size: 1.45rem;
      }

      .brand-mark {
        inline-size: 18px;
        block-size: 18px;
        border-radius: 6px;
        background: linear-gradient(135deg, #214178 0%, #6c8bc0 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Velvoix</span>
      </div>
      <p class="eyebrow">Under Construction</p>
      <h1>We are refining the site.</h1>
      <p>
        Velvoix is temporarily unavailable while we complete a controlled update.
        Please check back shortly.
      </p>
    </main>
  </body>
</html>
